wick, Newfoundland and Labrador, Prince Edward Island) and 3 territories (Yukon, Northwest Territories, Nunavut).\n\nThe capital city is **Ottawa**, located in Ontario.\n\n## Languages and Culture\n\nCanada is officially **bilingual**, recognizing both English and French. Quebec is predominantly French-speaking, reflecting the country''s colonial history. Canada is also celebrated for its **multiculturalism**, with significant immigrant communities contributing to a rich cultural mosaic.\n\n## Indigenous Peoples\n\nCanada''s Indigenous populations include **First Nations, Inuit, and Métis** peoples, who have inhabited the land for thousands of years. Reconciliation with Indigenous communities and addressing historical injustices remain important contemporary issues.\n\n## Economy\n\nCanada has a highly developed, mixed-market economy and is a member of the G7. Key sectors include:\n\n- **Natural resources:** Oil (especially Alberta''s oil sands), natural gas, minerals, and timber.\n- **Agriculture:** Wheat and other grains, particularly in the Prairies.\n- **Manufacturing and services:** Automotive, technology, and finance.\n- **Trade:** The United States is its largest trading partner.\n\n## History\n\n- Originally inhabited by Indigenous peoples.\n- Explored and colonized by the French and British starting in the 16th–17th centuries.\n- The British North America Act of 1867 united several colonies into the Dominion of Canada.\n- Gradually gained full independence, with the Constitution Act of 1982 transferring full legal authority from the United Kingdom.\n\n## Notable Features\n\n- **Major Cities:** Toronto (largest city), Montreal, Vancouver, Calgary, Edmonton, Ottawa.\n- **Symbols:** The maple leaf, the beaver, hockey, and the national anthem \"O Canada.\"\n- **Sports:** Ice hockey is the national winter sport; lacrosse is the national summer sport.\n- **Quality of Life:** Canada consistently ranks high in global measures of education, healthcare (universal public healthcare system), and overall living standards.\n\nWould you like me to expand on any particular aspect, such as its history, economy, or cultural life?"}],"stop_reason":"end_turn","stop_sequence":null,"stop_details":null,"usage":{"input_tokens":35,"cache_creation_input_tokens":0,"cache_read_input_tokens":0,"cache_creation":{"ephemeral_5m_input_tokens":0,"ephemeral_1h_input_tokens":0},"output_tokens":1372,"output_tokens_details":{"thinking_tokens":31},"service_tier":"standard","inference_geo":"global"}}'
